name: CI

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: crmv2
          POSTGRES_PASSWORD: crmv2_dev
          POSTGRES_DB: crmv2_test
        ports:
          - 5432:5432
        options: "--health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5"

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: "--health-cmd \"redis-cli ping\" --health-interval 10s --health-timeout 5s --health-retries 5"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run linter (typecheck)
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgresql://crmv2:crmv2_dev@localhost:5432/crmv2_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret
          GATEWAY_SECURITY_TOKEN: ci-gateway-token
          EVOLUTION_API_SECRET: ci-evo-secret
          EVOLUTION_API_KEY: ci-evo-key
          EVOLUTION_API_URL: http://localhost:8080

      - name: Build
        run: npm run build
